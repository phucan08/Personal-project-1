<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle}">Product Form</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="container form-container">

    <h1 th:text="${pageTitle}">Product Form</h1>

    <div th:if="${error}" class="alert error">
        <span th:text="${error}"></span>
    </div>

    <form th:action="@{/products/save}" th:object="${product}" method="post">

        <input type="hidden" th:field="*{id}">

        <div class="form-group">
            <label>Product Code</label>
            <input type="text" th:field="*{productCode}" placeholder="Example: BP001">
        </div>

        <div class="form-group">
            <label>Product Name</label>
            <input type="text" th:field="*{name}" placeholder="Example: Brake Pad">
        </div>

        <div class="form-group">
            <label>Brand</label>
            <input type="text" th:field="*{brand}" placeholder="Example: Bosch">
        </div>

        <div class="form-group">
            <label>Category</label>
            <select name="categoryId">
                <option value="">-- Select Category --</option>

                <option th:each="category : ${categories}"
                        th:value="${category.id}"
                        th:text="${category.name}"
                        th:selected="${product.category != null and product.category.id == category.id}">
                </option>
            </select>
        </div>

        <div class="form-group">
            <label>Description</label>
            <textarea th:field="*{description}" placeholder="Product description"></textarea>
        </div>

        <div class="form-group">
            <label>Price</label>
            <input type="number" step="0.01" th:field="*{price}" placeholder="Example: 25.50">
        </div>

        <div class="form-group">
            <label>Quantity</label>
            <input type="number" th:field="*{quantity}" placeholder="Example: 10">
        </div>

        <div class="form-group">
            <label>Image URL</label>
            <input type="text" th:field="*{imageUrl}" placeholder="Optional image URL">
        </div>

        <div class="button-row">
            <button type="submit" class="btn btn-primary">Save Product</button>
            <a th:href="@{/products}" class="btn btn-light">Cancel</a>
        </div>

    </form>

</div>

</body>
</html>
