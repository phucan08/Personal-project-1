<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Review</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="container form-container">

    <h1>Review Product</h1>

    <div class="order-info">
        <p><strong>Product:</strong> <span th:text="${product.name}"></span></p>
        <p><strong>Code:</strong> <span th:text="${product.productCode}"></span></p>
        <p><strong>Brand:</strong> <span th:text="${product.brand}"></span></p>
    </div>

    <div th:if="${error}" class="alert error">
        <span th:text="${error}"></span>
    </div>

    <form th:action="@{/reviews/save}" method="post">

        <input type="hidden" name="productId" th:value="${product.id}">

        <div class="form-group">
            <label>Rating</label>
            <select name="rating">
                <option value="5">5 - Excellent</option>
                <option value="4">4 - Good</option>
                <option value="3">3 - Average</option>
                <option value="2">2 - Poor</option>
                <option value="1">1 - Very Poor</option>
            </select>
        </div>

        <div class="form-group">
            <label>Comment</label>
            <textarea name="comment" placeholder="Write your review here"></textarea>
        </div>

        <div class="button-row">
            <button type="submit" class="btn btn-primary">Submit Review</button>
            <a class="btn btn-light" th:href="@{/products/{id}(id=${product.id})}">Cancel</a>
        </div>

    </form>

</div>

</body>
</html>
