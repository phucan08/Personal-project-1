<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - Auto Parts</title>
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>

<div class="auth-wrapper">
    <div class="auth-card">
        <h1>Login</h1>
        <p class="subtitle">Welcome back to Auto Parts System</p>

        <div th:if="${message}" class="alert success">
            <span th:text="${message}"></span>
        </div>

        <div th:if="${error}" class="alert error">
            <span th:text="${error}"></span>
        </div>

        <form th:action="@{/login}" th:object="${loginRequest}" method="post">
            <div class="form-group">
                <label>Email</label>
                <input type="email" th:field="*{email}" placeholder="Enter your email">
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" th:field="*{password}" placeholder="Enter your password">
            </div>

            <button type="submit" class="btn-auth">Login</button>
        </form>

        <p class="bottom-text">
            Do not have an account?
            <a th:href="@{/register}">Register here</a>
        </p>

        <p class="demo-account">
            Admin demo: admin@gmail.com / admin123
        </p>
    </div>
</div>

</body>
</html>
