<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register - Auto Parts</title>
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>

<div class="auth-wrapper">
    <div class="auth-card">
        <h1>Register</h1>
        <p class="subtitle">Create your Auto Parts account</p>

        <div th:if="${error}" class="alert error">
            <span th:text="${error}"></span>
        </div>

        <form th:action="@{/register}" th:object="${registerRequest}" method="post">
            <div class="form-group">
                <label>First Name</label>
                <input type="text" th:field="*{firstName}" placeholder="Enter first name">
            </div>

            <div class="form-group">
                <label>Last Name</label>
                <input type="text" th:field="*{lastName}" placeholder="Enter last name">
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" th:field="*{email}" placeholder="Enter email">
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" th:field="*{password}" placeholder="At least 6 characters">
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" th:field="*{confirmPassword}" placeholder="Confirm password">
            </div>

            <button type="submit" class="btn-auth">Register</button>
        </form>

        <p class="bottom-text">
            Already have an account?
            <a th:href="@{/login}">Login here</a>
        </p>
    </div>
</div>

</body>
</html>
