<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Manage Users</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="container">

    <div class="top-bar">
        <div>
            <h1>Manage Users</h1>
            <p>View all registered accounts in the system.</p>
        </div>

        <div>
            <a class="btn btn-light" th:href="@{/admin/dashboard}">Dashboard</a>
            <a class="btn btn-light" th:href="@{/products}">Products</a>
            <a class="btn btn-delete" th:href="@{/logout}">Logout</a>
        </div>
    </div>

    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Full Name</th>
            <th>Email</th>
            <th>Role</th>
            <th>Created At</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="user : ${users}">
            <td th:text="${user.id}"></td>
            <td th:text="${user.fullName}"></td>
            <td th:text="${user.email}"></td>
            <td>
                <span th:if="${user.role == 'ADMIN'}" class="badge admin-badge">ADMIN</span>
                <span th:if="${user.role == 'USER'}" class="badge user-badge">USER</span>
            </td>
            <td th:text="${#temporals.format(user.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
        </tr>

        <tr th:if="${#lists.isEmpty(users)}">
            <td colspan="5" class="empty">No users found.</td>
        </tr>
        </tbody>
    </table>

</div>

</body>
</html>
