<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle}">Category Form</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="container form-container">

    <h1 th:text="${pageTitle}">Category Form</h1>

    <div th:if="${error}" class="alert error">
        <span th:text="${error}"></span>
    </div>

    <form th:action="@{/categories/save}" th:object="${category}" method="post">

        <input type="hidden" th:field="*{id}">

        <div class="form-group">
            <label>Category Name</label>
            <input type="text" th:field="*{name}" placeholder="Example: Brake System">
        </div>

        <div class="form-group">
            <label>Description</label>
            <textarea th:field="*{description}" placeholder="Category description"></textarea>
        </div>

        <div class="button-row">
            <button type="submit" class="btn btn-primary">Save Category</button>
            <a th:href="@{/categories}" class="btn btn-light">Cancel</a>
        </div>

    </form>

</div>

</body>
</html>
